<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artists | The Accidental Watermelon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: #5b7fb8;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: #3d5a80;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
            border-bottom: 2px solid #2c4a6e;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77);
            border-radius: 8px;
        }

        .header-title {
            color: white;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.5px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .social-icons {
            display: flex;
            gap: 12px;
        }

        .social-icons a {
            color: white;
            font-size: 1.2rem;
            opacity: 0.8;
            transition: opacity 0.2s;
            text-decoration: none;
        }

        .social-icons a:hover {
            opacity: 1;
        }

        .clock {
            color: white;
            font-size: 1.1rem;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
        }

        /* Desktop Area */
        .desktop {
            padding-top: 50px;
            min-height: 100vh;
            position: relative;
        }

        /* Center Logo */
        .center-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 1;
        }

        .center-logo img {
            width: 200px;
            height: auto;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.3));
        }

        .center-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-top: 15px;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4ecdc4, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.2));
        }

        /* Folder Styles */
        .folder {
            position: absolute;
            width: 120px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s ease;
            text-decoration: none;
            z-index: 10;
        }

        .folder:hover {
            transform: scale(1.1);
            z-index: 100;
        }

        .folder-icon {
            width: 100px;
            height: 80px;
            margin: 0 auto 8px;
            border-radius: 5px 15px 10px 10px;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .folder-icon::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 0;
            width: 40px;
            height: 15px;
            border-radius: 5px 5px 0 0;
            background: inherit;
            filter: brightness(0.9);
        }

        .folder-label {
            font-size: 0.85rem;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.2;
        }

        /* Individual folder colors */
        .folder-bingi .folder-icon { background: linear-gradient(135deg, #ff9a9e, #fecfef); }
        .folder-bingi .folder-label {
            background: linear-gradient(90deg, #ff6b6b, #ff8e53);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
        }

        .folder-fop .folder-icon { background: linear-gradient(135deg, #a8edea, #fed6e3); }
        .folder-fop .folder-label {
            background: linear-gradient(90deg, #11998e, #38ef7d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .folder-bigj .folder-icon { background: linear-gradient(135deg, #ffecd2, #fcb69f); }
        .folder-bigj .folder-label {
            background: linear-gradient(90deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .folder-joey .folder-icon { background: linear-gradient(135deg, #a1c4fd, #c2e9fb); }
        .folder-joey .folder-label {
            background: linear-gradient(90deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .folder-nitsu .folder-icon { background: linear-gradient(135deg, #d299c2, #fef9d7); }
        .folder-nitsu .folder-label {
            background: linear-gradient(90deg, #f857a6, #ff5858);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .folder-digital .folder-icon { background: linear-gradient(135deg, #89f7fe, #66a6ff); }
        .folder-digital .folder-label {
            background: linear-gradient(90deg, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .folder-jdynasty .folder-icon { background: linear-gradient(135deg, #fddb92, #d1fdff); }
        .folder-jdynasty .folder-label {
            background: linear-gradient(90deg, #fa709a, #fee140);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .folder-sulpa .folder-icon { background: linear-gradient(135deg, #c1dfc4, #deecdd); }
        .folder-sulpa .folder-label {
            background: linear-gradient(90deg, #56ab2f, #a8e063);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Scattered positions */
        .folder-bingi { top: 12%; left: 8%; }
        .folder-fop { top: 25%; left: 75%; }
        .folder-bigj { top: 55%; left: 5%; }
        .folder-joey { top: 70%; left: 25%; }
        .folder-nitsu { top: 15%; left: 70%; }
        .folder-digital { top: 45%; left: 80%; }
        .folder-jdynasty { top: 75%; left: 70%; }
        .folder-sulpa { top: 35%; left: 18%; }

        /* Home link */
        .home-folder {
            position: absolute;
            top: 80%;
            left: 50%;
            transform: translateX(-50%);
        }

        .home-folder .folder-icon {
            background: linear-gradient(135deg, #fff, #e0e0e0);
        }

        .home-folder .folder-label {
            background: linear-gradient(90deg, #333, #666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .folder {
                position: relative;
                display: inline-block;
                margin: 20px;
            }

            .desktop {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                align-items: flex-start;
                padding: 80px 20px 40px;
            }

            .center-logo {
                position: relative;
                top: auto;
                left: auto;
                transform: none;
                width: 100%;
                margin-bottom: 30px;
            }

            .folder-bingi, .folder-fop, .folder-bigj, .folder-joey,
            .folder-nitsu, .folder-digital, .folder-jdynasty, .folder-sulpa,
            .home-folder {
                top: auto;
                left: auto;
                transform: none;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="logo-icon"></div>
            <span class="header-title">THE ACCIDENTAL WATERMELON</span>
        </div>
        <div class="header-right">
            <div class="social-icons">
                <a href="#" title="YouTube">YT</a>
                <a href="#" title="Spotify">SP</a>
                <a href="#" title="Instagram">IG</a>
                <a href="#" title="TikTok">TT</a>
            </div>
            <div class="clock" id="clock">00:00:00</div>
        </div>
    </header>

    <div class="desktop">
        <div class="center-logo">
            <img src="pics/TAWLogo.png" alt="TAW Logo" onerror="this.style.display='none'">
            <div class="center-title">TAW</div>
        </div>

        <a href="bingi.html" class="folder folder-bingi">
            <div class="folder-icon"></div>
            <div class="folder-label">Playboi<br>Bingi</div>
        </a>

        <a href="fop-shvrt.html" class="folder folder-fop">
            <div class="folder-icon"></div>
            <div class="folder-label">Fop-Shvrt</div>
        </a>

        <a href="tha-big-j.html" class="folder folder-bigj">
            <div class="folder-icon"></div>
            <div class="folder-label">THA<br>BIG J</div>
        </a>

        <a href="joey-fatass.html" class="folder folder-joey">
            <div class="folder-icon"></div>
            <div class="folder-label">Joey<br>Fata$$</div>
        </a>

        <a href="nitsu.html" class="folder folder-nitsu">
            <div class="folder-icon"></div>
            <div class="folder-label">nitsu</div>
        </a>

        <a href="digitalestrogen.html" class="folder folder-digital">
            <div class="folder-icon"></div>
            <div class="folder-label">digital<br>estrogen</div>
        </a>

        <a href="j-dynasty.html" class="folder folder-jdynasty">
            <div class="folder-icon"></div>
            <div class="folder-label">J Dynasty</div>
        </a>

        <a href="sulpa-boy.html" class="folder folder-sulpa">
            <div class="folder-icon"></div>
            <div class="folder-label">Sulpa<br>Boy</div>
        </a>

        <a href="index.html" class="folder home-folder">
            <div class="folder-icon"></div>
            <div class="folder-label">Home</div>
        </a>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const time = now.toLocaleTimeString('en-US', { hour12: false });
            document.getElementById('clock').textContent = time;
        }
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
