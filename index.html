<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Accidental Watermelon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            text-align: center;
            max-width: 800px;
        }

        .logo {
            width: 200px;
            height: auto;
            margin-bottom: 30px;
            filter: drop-shadow(0 10px 40px rgba(0,0,0,0.3));
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 700;
            color: white;
            margin-bottom: 20px;
            text-shadow: 4px 4px 0px rgba(0,0,0,0.2);
            line-height: 1.1;
        }

        h1 span {
            display: block;
            background: linear-gradient(90deg, #ffd93d, #ff6b6b, #4ecdc4, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-size: 1.3rem;
            color: rgba(255,255,255,0.9);
            margin-bottom: 50px;
            font-weight: 500;
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 18px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Fredoka', sans-serif;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ffd93d, #ff6b6b);
            color: #333;
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(255, 107, 107, 0.5);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid rgba(255,255,255,0.5);
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-3px);
        }

        .footer {
            position: fixed;
            bottom: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
        }

        .footer a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="pics/TAWLogo.png" alt="TAW Logo" class="logo" onerror="this.style.display='none'">
        <h1>
            The Accidental
            <span>Watermelon</span>
        </h1>
        <p class="tagline">Music Collective</p>
        <div class="buttons">
            <a href="artists.html" class="btn btn-primary">Meet The Artists</a>
            <a href="mailto:contact@accidentalwatermelon.com" class="btn btn-secondary">Contact</a>
        </div>
    </div>
    <div class="footer">
        <a href="mailto:contact@accidentalwatermelon.com">contact@accidentalwatermelon.com</a>
    </div>
</body>
</html>
