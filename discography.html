<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discography | The Accidental Watermelon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;700;900&family=Righteous&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-green: #39ff14;
            --neon-pink: #ff10f0;
            --neon-blue: #00f0ff;
            --neon-orange: #ff6600;
            --neon-purple: #bf00ff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, #000, #1a0033, #003333, #1a0033, #000);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 15px 30px;
            z-index: 1000;
            backdrop-filter: blur(10px);
            border-bottom: 2px solid rgba(57, 255, 20, 0.3);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-img {
            height: 50px;
            width: auto;
            filter: drop-shadow(0 0 10px var(--neon-green));
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: 900;
            background: linear-gradient(45deg, var(--neon-green), var(--neon-pink), var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            list-style: none;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s;
        }

        .nav-links a:hover {
            color: var(--neon-green);
            text-shadow: 0 0 20px var(--neon-green);
        }

        /* Main Content */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 120px 40px 60px;
        }

        .page-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 60px;
            background: linear-gradient(45deg, var(--neon-green), var(--neon-pink), var(--neon-blue), var(--neon-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 300%;
            animation: titleShift 5s ease infinite;
        }

        @keyframes titleShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* Artist Section */
        .artist-section {
            margin-bottom: 80px;
        }

        .artist-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(57, 255, 20, 0.3);
        }

        .artist-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--neon-green);
            box-shadow: 0 0 20px var(--neon-green);
        }

        .artist-name {
            font-family: 'Bebas Neue', cursive;
            font-size: 2.5rem;
            color: var(--neon-green);
            text-shadow: 0 0 20px var(--neon-green);
        }

        /* Release Grid */
        .releases-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        /* Release Card */
        .release-card {
            background: linear-gradient(135deg, rgba(57, 255, 20, 0.05), rgba(255, 16, 240, 0.05));
            border: 2px solid rgba(57, 255, 20, 0.3);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .release-card:hover {
            transform: translateY(-5px);
            border-color: var(--neon-green);
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.3);
        }

        .release-cover {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-bottom: 2px solid rgba(57, 255, 20, 0.3);
        }

        .release-cover-placeholder {
            width: 100%;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            background: linear-gradient(135deg, rgba(57, 255, 20, 0.1), rgba(255, 16, 240, 0.1));
            border-bottom: 2px solid rgba(57, 255, 20, 0.3);
        }

        .release-info {
            padding: 20px;
        }

        .release-type {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--neon-pink);
            margin-bottom: 8px;
        }

        .release-title {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 8px;
        }

        .release-artists {
            font-size: 0.9rem;
            color: var(--neon-blue);
            margin-bottom: 5px;
        }

        .release-features {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 15px;
        }

        /* Streaming Links */
        .streaming-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .stream-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 8px 12px;
            font-size: 0.75rem;
            text-decoration: none;
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            transition: all 0.3s;
        }

        .stream-link:hover {
            background: var(--neon-green);
            color: #000;
            border-color: var(--neon-green);
        }

        .stream-link.spotify:hover {
            background: #1DB954;
            border-color: #1DB954;
        }

        .stream-link.apple:hover {
            background: #fc3c44;
            border-color: #fc3c44;
        }

        .stream-link.soundcloud:hover {
            background: #ff5500;
            border-color: #ff5500;
        }

        .stream-link.youtube:hover {
            background: #ff0000;
            border-color: #ff0000;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .page-title {
                font-size: 2.5rem;
            }

            .nav-links {
                display: none;
            }

            .releases-grid {
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            }

            .artist-header {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation"></div>

    <!-- Header -->
    <header>
        <nav>
            <div class="logo">
                <img src="pics/TAWLogo.png" alt="Accidental Watermelon Logo" class="logo-img" onerror="this.style.display='none';">
                <span class="logo-text">ACCIDENTAL WATERMELON</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">HOME</a></li>
                <li><a href="discography.html">DISCOGRAPHY</a></li>
                <li><a href="releases.html">LATEST</a></li>
                <li><a href="about.html">ABOUT</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Content -->
    <div class="container">
        <h1 class="page-title">DISCOGRAPHY</h1>

        <!-- ARTIST TEMPLATE - Copy this section for each artist -->
        <div class="artist-section">
            <div class="artist-header">
                <img src="pics/Playboi_Bingi.png" alt="Playboi Bingi" class="artist-avatar" onerror="this.style.display='none';">
                <h2 class="artist-name">PLAYBOI BINGI</h2>
            </div>

            <div class="releases-grid">
                <!-- RELEASE TEMPLATE - Copy this card for each release -->
                <div class="release-card">
                    <!-- Option 1: With cover art image -->
                    <img src="pics/covers/album-cover.png" alt="Album Cover" class="release-cover" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <!-- Option 2: Placeholder if no image -->
                    <div class="release-cover-placeholder" style="display: none;">🍉</div>

                    <div class="release-info">
                        <p class="release-type">Album</p> <!-- Album / Single / EP -->
                        <h3 class="release-title">ALBUM TITLE HERE</h3>
                        <p class="release-artists">Playboi Bingi</p>
                        <p class="release-features">ft. Artist Name, Another Artist</p>

                        <div class="streaming-links">
                            <a href="#" class="stream-link spotify">Spotify</a>
                            <a href="#" class="stream-link apple">Apple</a>
                            <a href="#" class="stream-link soundcloud">SoundCloud</a>
                            <a href="#" class="stream-link youtube">YouTube</a>
                        </div>
                    </div>
                </div>
                <!-- END RELEASE TEMPLATE -->

                <!-- Example Single -->
                <div class="release-card">
                    <div class="release-cover-placeholder">🎵</div>
                    <div class="release-info">
                        <p class="release-type">Single</p>
                        <h3 class="release-title">SINGLE TITLE HERE</h3>
                        <p class="release-artists">Playboi Bingi</p>
                        <p class="release-features">ft. Featured Artist</p>

                        <div class="streaming-links">
                            <a href="#" class="stream-link spotify">Spotify</a>
                            <a href="#" class="stream-link soundcloud">SoundCloud</a>
                        </div>
                    </div>
                </div>

            </div>
        </div>
        <!-- END ARTIST TEMPLATE -->

        <!-- Add more artists below by copying the artist-section template -->

    </div>
</body>
</html>
